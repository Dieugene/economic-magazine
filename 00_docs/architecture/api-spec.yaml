openapi: 3.0.3
info:
  title: ВТЭ — Вопросы теоретической экономики API
  description: |
    REST API для сайта журнала «Вопросы теоретической экономики».

    Две группы эндпоинтов:
    - `/api/` — публичные (без авторизации), для клиентской части сайта
    - `/api/admin/` — закрытые (JWT), для админ-панели

    ---

    ## Backend Implementation Notes

    ### DOI
    Формат DOI: `10.52342/2587-7666VTE_{year}_{issue}_{startpage}_{endpage}`
    Пример: `10.52342/2587-7666VTE_2026_1_7_21`

    ### PDF
    Бэкенд хранит и раздаёт PDF-файлы статей и полных выпусков.
    Фронтенд получает готовый URL (`pdf_url`, `full_pdf_url`) и просто отображает ссылку.
    Поле `pdf_size_kb` — целое число, размер PDF в килобайтах (отображается пользователю рядом со ссылкой на скачивание).

    ### JATS XML
    Поле `xml_url` содержит внешнюю ссылку на XML-версию статьи на сайте journals.rcsi.science.
    Хранится как строка (URL). Пример: `https://journals.rcsi.science/vte/article/view/2026_1_7_21/xml`

    ### Обложки номеров
    Обложки загружаются через админку (`POST /api/admin/upload/issue-cover/`),
    хранятся на сервере и отдаются как статические файлы.
    Поле `cover_url` — относительный или абсолютный URL изображения.

    ### 7 фиксированных рубрик журнала
    Рубрики имеют фиксированный порядок и не создаются/удаляются через API:

    | # | slug                | Русское название                         | English name                   |
    |---|---------------------|------------------------------------------|--------------------------------|
    | 1 | `economic-theory`   | Экономическая теория                     | Economic Theory                |
    | 2 | `methodology`       | Методология экономической науки          | Methodology of Economics       |
    | 3 | `theory-to-policy`  | От теории к экономической политике       | From Theory to Economic Policy |
    | 4 | `history-of-thought`| История мысли                            | History of Thought             |
    | 5 | `interdisciplinary` | Междисциплинарные исследования           | Interdisciplinary Studies      |
    | 6 | `economic-history`  | Экономическая история                    | Economic History               |
    | 7 | `reviews`           | Обзоры и рецензии                        | Reviews                        |

    ### Группировка статей в IssueFull
    Эндпоинт `GET /api/issues/{id}/` возвращает `IssueFull`, в котором поле `sections` —
    массив объектов `{section, articles[]}`. Статьи **обязательно** группируются по рубрикам
    в порядке, указанном в таблице выше. Рубрики, в которых нет статей в данном номере,
    в массив не включаются.

    ### Публичные эндпоинты и статус
    Все публичные эндпоинты (`/api/...`) возвращают **только** данные со статусом `status=published`.
    Черновики и номера со статусом `ready` доступны только через админские эндпоинты.

    ### Параметр `lang`
    Публичные эндпоинты принимают query-параметр `lang` (`ru` | `en`, по умолчанию `ru`).
    При `lang=en` бэкенд должен возвращать английские значения локализованных полей
    (`title`, `abstract`, `full_name`, `affiliation`, `degree`, `name` и т.д.) там, где они заполнены.
    Если английский вариант не заполнен — возвращать русский (fallback).

    ### CORS
    Бэкенд **обязан** выставлять CORS-заголовки, разрешающие запросы с домена фронтенда.
    Минимально необходимые заголовки:
    - `Access-Control-Allow-Origin: https://questionset.ru` (или `*` для dev-режима)
    - `Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS`
    - `Access-Control-Allow-Headers: Content-Type, Authorization`

    Для Django рекомендуется `django-cors-headers` с настройкой `CORS_ALLOWED_ORIGINS`.

  version: 1.0.0
  contact:
    name: Команда фронтенда ВТЭ

servers:
  - url: https://api.questionset.ru
    description: Production
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Issues (public)
    description: Номера журнала — публичный доступ
  - name: Articles (public)
    description: Статьи — публичный доступ
  - name: Sections (public)
    description: Рубрики — публичный доступ
  - name: Editorial Board (public)
    description: Редколлегия — публичный доступ
  - name: Pages (public)
    description: Статические страницы — публичный доступ
  - name: Search (public)
    description: Поиск по сайту
  - name: Auth
    description: Авторизация админ-панели
  - name: Issues (admin)
    description: Управление номерами
  - name: Articles (admin)
    description: Управление статьями
  - name: Files (admin)
    description: Загрузка файлов
  - name: Editorial Board (admin)
    description: Управление редколлегией

# ============================================================
# SECURITY
# ============================================================
security: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ==========================================================
  # SCHEMAS
  # ==========================================================
  schemas:

    # ---------- Enums ----------

    ArticleType:
      type: string
      enum: [scientific, review, book_review, editorial]
      description: |
        Тип статьи:
        - scientific — научная
        - review — обзор
        - book_review — рецензия
        - editorial — от редактора

    SectionSlug:
      type: string
      enum:
        - economic-theory
        - methodology
        - theory-to-policy
        - history-of-thought
        - interdisciplinary
        - economic-history
        - reviews
      description: |
        Рубрики журнала (фиксированный набор, порядок важен):
        - economic-theory — Экономическая теория
        - methodology — Методология экономической науки
        - theory-to-policy — От теории к экономической политике
        - history-of-thought — История мысли
        - interdisciplinary — Междисциплинарные исследования
        - economic-history — Экономическая история
        - reviews — Обзоры и рецензии

    IssueStatus:
      type: string
      enum: [draft, ready, published]
      description: |
        Статус номера:
        - draft — черновик (заполняется)
        - ready — готов к публикации
        - published — опубликован на сайте

    Lang:
      type: string
      enum: [ru, en]
      default: ru

    # ---------- Nested objects ----------

    LocalizedString:
      type: object
      required: [ru]
      properties:
        ru:
          type: string
        en:
          type: string
      description: Строка на двух языках

    LocalizedText:
      type: object
      required: [ru]
      properties:
        ru:
          type: string
          description: Текст на русском
        en:
          type: string
          description: Текст на английском
      description: Длинный текст на двух языках (аннотация и т.п.)

    Author:
      type: object
      required: [full_name, affiliation]
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          $ref: '#/components/schemas/LocalizedString'
          description: ФИО полностью
        affiliation:
          $ref: '#/components/schemas/LocalizedString'
          description: Место работы / организация
        email:
          type: string
          format: email
          nullable: true
        orcid:
          type: string
          nullable: true
          example: "0000-0001-8169-729X"

    Reference:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        text_ru:
          type: string
          description: Запись в списке ЛИТЕРАТУРА
        text_en:
          type: string
          description: Запись в списке REFERENCES
        order:
          type: integer
          description: Порядковый номер в списке

    EditorialBoardMember:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          $ref: '#/components/schemas/LocalizedString'
        role:
          type: string
          nullable: true
          description: "Роль в редколлегии (главный редактор, зам. гл. редактора, ответственный секретарь и т.д.)"
        degree:
          $ref: '#/components/schemas/LocalizedString'
          description: "Учёная степень и звание"
        affiliation:
          $ref: '#/components/schemas/LocalizedString'
          description: "Должность и организация"
        email:
          type: string
          format: email
          nullable: true
        spin_code:
          type: string
          nullable: true
          example: "6086-8715"
        orcid:
          type: string
          nullable: true
          example: "0000-0001-8169-729X"
        scopus_id:
          type: string
          nullable: true
        order:
          type: integer
          description: Порядок отображения

    # ---------- Main entities ----------

    Section:
      type: object
      properties:
        slug:
          $ref: '#/components/schemas/SectionSlug'
        name:
          $ref: '#/components/schemas/LocalizedString'

    IssueSummary:
      type: object
      description: Краткая информация о номере (для списков)
      properties:
        id:
          type: integer
        year:
          type: integer
          example: 2026
        number:
          type: integer
          description: Порядковый номер в году (1-4)
          example: 1
        sequential_number:
          type: integer
          description: Сквозной номер
          example: 30
        published_date:
          type: string
          format: date
          example: "2026-02-27"
        cover_url:
          type: string
          format: uri
          nullable: true
          description: URL обложки
        full_pdf_url:
          type: string
          format: uri
          nullable: true
          description: URL PDF полного выпуска
        status:
          $ref: '#/components/schemas/IssueStatus'
        article_count:
          type: integer
          description: Количество статей в номере

    IssueFull:
      type: object
      description: |
        Полная информация о номере с содержанием.
        Поле `sections` содержит статьи, сгруппированные по рубрикам
        в фиксированном порядке (см. SectionSlug). Рубрики без статей не включаются.
      allOf:
        - $ref: '#/components/schemas/IssueSummary'
        - type: object
          properties:
            sections:
              type: array
              description: Содержание, сгруппированное по рубрикам
              items:
                type: object
                properties:
                  section:
                    $ref: '#/components/schemas/Section'
                  articles:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArticleSummary'

    ArticleSummary:
      type: object
      description: Краткая информация о статье (для списков и содержания номера)
      properties:
        id:
          type: integer
        title:
          $ref: '#/components/schemas/LocalizedString'
        authors:
          type: array
          items:
            $ref: '#/components/schemas/Author'
        section:
          $ref: '#/components/schemas/Section'
        pages:
          type: string
          example: "7-21"
        doi:
          type: string
          nullable: true
          example: "10.52342/2587-7666VTE_2026_1_7_21"
        pdf_url:
          type: string
          format: uri
          nullable: true
        pdf_size_kb:
          type: integer
          nullable: true
          description: Размер PDF в КБ (отображается на странице номера рядом со статьёй)
          example: 188
        abstract:
          $ref: '#/components/schemas/LocalizedText'
          nullable: true
          description: Аннотация (для раскрывающегося блока на странице содержания номера)
        article_type:
          $ref: '#/components/schemas/ArticleType'
        issue_id:
          type: integer
        issue_year:
          type: integer
        issue_number:
          type: integer
        issue_sequential_number:
          type: integer
          description: Сквозной номер выпуска (для отображения «№ 1 (30)» на странице статьи)
          example: 30

    ArticleFull:
      type: object
      description: Полная информация о статье (страница статьи)
      allOf:
        - $ref: '#/components/schemas/ArticleSummary'
        - type: object
          properties:
            keywords:
              type: object
              properties:
                ru:
                  type: array
                  items:
                    type: string
                en:
                  type: array
                  items:
                    type: string
            udk:
              type: string
              nullable: true
              description: Код УДК
            jel_codes:
              type: array
              items:
                type: string
              description: Коды JEL
              example: ["D80", "E22", "G31"]
            references:
              type: array
              items:
                $ref: '#/components/schemas/Reference'
            received_date:
              type: string
              format: date
              nullable: true
              description: Дата получения статьи
            accepted_date:
              type: string
              format: date
              nullable: true
              description: Дата принятия в печать
            funding:
              $ref: '#/components/schemas/LocalizedText'
              nullable: true
              description: Источники финансирования
            xml_url:
              type: string
              format: uri
              nullable: true
              description: Ссылка на JATS XML (внешний ресурс journals.rcsi.science, хранится как строка URL)

    # ---------- Admin input schemas ----------

    IssueCreate:
      type: object
      required: [year, number]
      properties:
        year:
          type: integer
          example: 2026
        number:
          type: integer
          example: 1
        sequential_number:
          type: integer
          example: 30
        published_date:
          type: string
          format: date
          nullable: true

    IssueUpdate:
      type: object
      properties:
        year:
          type: integer
        number:
          type: integer
        sequential_number:
          type: integer
        published_date:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/IssueStatus'

    ArticleCreate:
      type: object
      required: [issue_id, title, section, article_type]
      properties:
        issue_id:
          type: integer
        title:
          $ref: '#/components/schemas/LocalizedString'
        section:
          $ref: '#/components/schemas/SectionSlug'
        article_type:
          $ref: '#/components/schemas/ArticleType'
        authors:
          type: array
          items:
            type: object
            required: [full_name, affiliation]
            properties:
              full_name:
                $ref: '#/components/schemas/LocalizedString'
              affiliation:
                $ref: '#/components/schemas/LocalizedString'
              email:
                type: string
                format: email
                nullable: true
              orcid:
                type: string
                nullable: true
        abstract:
          $ref: '#/components/schemas/LocalizedText'
        keywords:
          type: object
          properties:
            ru:
              type: array
              items:
                type: string
            en:
              type: array
              items:
                type: string
        pages:
          type: string
          example: "7-21"
        doi:
          type: string
          nullable: true
        udk:
          type: string
          nullable: true
        jel_codes:
          type: array
          items:
            type: string
        references:
          type: array
          items:
            type: object
            properties:
              text_ru:
                type: string
              text_en:
                type: string
              order:
                type: integer
        received_date:
          type: string
          format: date
          nullable: true
        accepted_date:
          type: string
          format: date
          nullable: true
        funding:
          $ref: '#/components/schemas/LocalizedText'
          nullable: true
        xml_url:
          type: string
          format: uri
          nullable: true
        order_in_issue:
          type: integer
          description: Порядковый номер статьи в номере

    ArticleUpdate:
      description: Все поля опциональны при обновлении
      allOf:
        - $ref: '#/components/schemas/ArticleCreate'
      required: []

    # ---------- Pagination ----------

    PaginatedResponse:
      type: object
      properties:
        count:
          type: integer
          description: Общее количество записей
        next:
          type: string
          format: uri
          nullable: true
        previous:
          type: string
          format: uri
          nullable: true
        results:
          type: array
          items: {}

    # ---------- Auth ----------

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        access:
          type: string
          description: JWT access token
        refresh:
          type: string
          description: JWT refresh token

    # ---------- Errors ----------

    Error:
      type: object
      properties:
        detail:
          type: string
        code:
          type: string

# ============================================================
# PATHS
# ============================================================
paths:

  # ==========================================================
  # PUBLIC: Issues
  # ==========================================================

  /api/issues/:
    get:
      tags: [Issues (public)]
      summary: Список номеров журнала
      description: |
        Возвращает список номеров. Без фильтров — все опубликованные номера.
        С фильтром year — номера за конкретный год.
      parameters:
        - name: year
          in: query
          schema:
            type: integer
          description: Фильтр по году
        - name: lang
          in: query
          schema:
            $ref: '#/components/schemas/Lang'
      responses:
        '200':
          description: Список номеров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssueSummary'

  /api/issues/latest/:
    get:
      tags: [Issues (public)]
      summary: Последний опубликованный номер
      description: Возвращает самый свежий опубликованный номер (для блока «Свежий номер»)
      responses:
        '200':
          description: Последний номер
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSummary'
              example:
                id: 1
                year: 2026
                number: 1
                sequential_number: 30
                published_date: "2026-02-27"
                cover_url: "/covers/vte_2026_1.jpg"
                full_pdf_url: "https://journals.rcsi.science/vte/issue/download/2026_1/full.pdf"
                status: "published"
                article_count: 12

  /api/issues/years/:
    get:
      tags: [Issues (public)]
      summary: Список годов с номерами
      description: Возвращает список годов, за которые есть опубликованные номера (для навигации в архиве)
      responses:
        '200':
          description: Список годов
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                example: [2026, 2025, 2024, 2023, 2022, 2021, 2020, 2019, 2018, 2017]

  /api/issues/{id}/:
    get:
      tags: [Issues (public)]
      summary: Полная информация о номере
      description: |
        Возвращает номер с содержанием (статьи, сгруппированные по рубрикам).
        Рубрики расположены в фиксированном порядке (см. SectionSlug).
        Рубрики без статей в данном номере не включаются в массив `sections`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: lang
          in: query
          schema:
            $ref: '#/components/schemas/Lang'
      responses:
        '200':
          description: Номер с содержанием
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueFull'
              example:
                id: 1
                year: 2026
                number: 1
                sequential_number: 30
                published_date: "2026-02-27"
                cover_url: "/covers/vte_2026_1.jpg"
                full_pdf_url: "https://journals.rcsi.science/vte/issue/download/2026_1/full.pdf"
                status: "published"
                article_count: 12
                sections:
                  - section:
                      slug: "economic-theory"
                      name:
                        ru: "Экономическая теория"
                        en: "Economic Theory"
                    articles:
                      - id: 1
                        title:
                          ru: "Научная деятельность в цифровую эпоху: производство и распространение знания"
                        authors:
                          - id: 1
                            full_name:
                              ru: "А.Я. Рубинштейн"
                              en: "A.Ya. Rubinstein"
                            affiliation:
                              ru: "ФГБУН Институт экономики РАН, Москва, Россия"
                              en: "Institute of Economics of the Russian Academy of Sciences, Moscow, Russia"
                            email: "arubin@aha.ru"
                            orcid: "0000-0003-0455-3879"
                          - id: 2
                            full_name:
                              ru: "Е.Э. Чуковская"
                              en: "E.E. Chukovskaya"
                            affiliation:
                              ru: "АНО ДПО «Научно-образовательный центр интеллектуальной собственности и цифровой экономики», Москва, Россия"
                              en: "Scientific and Educational Centre for Intellectual Property and Digital Economy, Moscow, Russia"
                            email: "echukovskaya@yandex.ru"
                            orcid: "0000-0002-2715-761X"
                        section:
                          slug: "economic-theory"
                          name:
                            ru: "Экономическая теория"
                            en: "Economic Theory"
                        pages: "7-21"
                        doi: "10.52342/2587-7666VTE_2026_1_7_21"
                        pdf_url: "https://journals.rcsi.science/vte/article/download/2026_1_7_21/pdf"
                        pdf_size_kb: 188
                        abstract:
                          ru: "В статье представлен анализ современной ситуации, сложившейся спустя 12 лет после передачи в 2013 г. академических институтов..."
                          en: "The article presents an analysis of the current situation 12 years after the transfer in 2013 of academic institutions..."
                        article_type: "scientific"
                        issue_id: 1
                        issue_year: 2026
                        issue_number: 1
                        issue_sequential_number: 30
                      - id: 2
                        title:
                          ru: "Неопределённость и экономическая активность: теоретические аспекты"
                        authors:
                          - id: 3
                            full_name:
                              ru: "Н.В. Комаровская"
                            affiliation:
                              ru: "МГУ им. М.В. Ломоносова, Москва, Россия"
                            email: null
                            orcid: null
                        section:
                          slug: "economic-theory"
                          name:
